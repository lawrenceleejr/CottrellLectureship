# Build the Hugo site on every push/PR; deploy to GitHub Pages only from main.
# Required repo setting (one time): Settings -> Pages -> Source: GitHub Actions.
# configure-pages is best-effort (continue-on-error) so feature-branch builds stay
# green before Pages is enabled; on main it supplies the authoritative base URL.
name: pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.140.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # themes are often submodules
          fetch-depth: 0
      - name: Install Hugo (extended)
        run: |
          curl -fSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin hugo
          hugo version
      - uses: actions/configure-pages@v5
        id: pages
        continue-on-error: true   # Pages may not be enabled yet on feature branches
      - name: Build
        # Use the Pages-provided base URL once Pages is enabled (correct on main);
        # fall back to the configured project URL so branch builds stay green.
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url || 'https://lawrenceleejr.github.io/CottrellLectureship' }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
