<a class="skip-link" href="#content">Skip to content</a>
<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      <svg class="brand-mark" viewBox="0 0 26 16" width="26" height="16" fill="none" aria-hidden="true" focusable="false">
        <circle class="brand-ring brand-ring--a" cx="8" cy="8" r="5.75"></circle>
        <circle class="brand-ring brand-ring--b" cx="18" cy="8" r="5.75"></circle>
      </svg>
      <span class="brand-title">{{ site.Title }}</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        {{ $url := .URL }}
        {{ with .Page }}{{ $url = .RelPermalink }}{{ end }}
        <a href="{{ $url }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
