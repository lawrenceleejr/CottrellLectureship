{{ define "main" }}
  <section class="page-head">
    <div class="wrap">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ with .Content }}<div class="prose section-sub">{{ . }}</div>{{ end }}
    </div>
  </section>

  <section class="lectures">
    {{ range .Pages.ByDate.Reverse }}
      {{ partial "pairing-card.html" (dict "page" . "level" 2 "compact" true) }}
    {{ else }}
      <p class="wrap empty">No colloquia announced yet — check back soon.</p>
    {{ end }}
  </section>
{{ end }}
