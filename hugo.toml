# Site configuration. On `main`, CI derives the exact Pages URL via configure-pages
# and passes it as --baseURL; this value is the fallback for local/branch builds.
# Change it if you use a custom domain.
baseURL = "https://lawrenceleejr.github.io/CottrellLectureship/"
languageCode = "en-us"
title = "Cottrell Lectureship Series"
enableRobotsTXT = true

# Not a blog — drop the default tag/category taxonomy pages.
disableKinds = ["taxonomy", "term"]

# Order lecture pages newest-first by default (templates also sort explicitly).
[params]
  # ---- Edit these for your series ----------------------------------------
  tagline = "One teacher-scholar, two talks in the same region — hosted by a Cottrell Scholar and a regional partner."
  funder = "Research Corporation for Science Advancement (RCSA)"
  funderShort = "RCSA"
  program = "Cottrell Collaborative project"
  # Shown in the footer. Replace with a real address (or leave blank to hide).
  contactEmail = "cottrell-lectures@example.edu"
  # -----------------------------------------------------------------------

# Allow inline HTML in Markdown content (e.g. the About page).
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[[menu.main]]
  name = "Home"
  pageRef = "/"
  weight = 10
[[menu.main]]
  name = "Speakers"
  pageRef = "/lectures/"
  weight = 20
[[menu.main]]
  name = "About"
  pageRef = "/about/"
  weight = 30
